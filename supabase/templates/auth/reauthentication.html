<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="x-apple-disable-message-reformatting" />
    <meta name="color-scheme" content="light only" />
    <meta name="supported-color-schemes" content="light only" />
    <title>Confirm it's you — MomentoVino</title>
    <style>
      @media (prefers-color-scheme: dark) {
        body, table, td { background-color: #F5EBE0 !important; color: #3F2A2E !important; }
      }
      body { margin:0; padding:0; background-color:#F5EBE0; -webkit-font-smoothing:antialiased; }
      .code {
        font-family: 'SF Mono','Menlo','Consolas',monospace;
        font-size: 32px;
        letter-spacing: 8px;
        font-weight: 700;
        color: #722F37;
        background-color: #F5EBE0;
        border: 1px solid #E8DDD4;
        border-radius: 14px;
        padding: 18px 22px;
        display: inline-block;
      }
      @media (max-width: 600px) {
        .card { padding:28px 22px !important; border-radius:18px !important; }
        .h1 { font-size:26px !important; line-height:32px !important; }
        .code { font-size:26px !important; letter-spacing:6px !important; }
      }
    </style>
  </head>
  <body style="background-color:#F5EBE0;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#F5EBE0;">
      <tr>
        <td align="center" style="padding:40px 16px;">
          <table role="presentation" width="560" cellpadding="0" cellspacing="0" border="0" style="max-width:560px;width:100%;">
            <tr>
              <td align="center" style="padding-bottom:20px;">
                <span style="font-family:'DM Serif Display','Playfair Display',Georgia,serif;font-size:24px;color:#722F37;letter-spacing:0.5px;">
                  MomentoVino
                </span>
              </td>
            </tr>
            <tr>
              <td class="card" style="background-color:#FFFFFF;border-radius:22px;padding:36px 32px;border:1px solid #E8DDD4;">
                <h1 class="h1" style="margin:0 0 12px 0;font-family:'DM Serif Display','Playfair Display',Georgia,serif;font-weight:400;font-size:30px;line-height:36px;color:#722F37;">
                  Confirm it's you.
                </h1>
                <p style="margin:0 0 20px 0;font-family:'DM Sans','Helvetica Neue',Arial,sans-serif;font-size:15px;line-height:22px;color:#3F2A2E;">
                  We need to verify it's really you before completing this action. Enter this code in MomentoVino:
                </p>
                <div style="text-align:center;margin:16px 0 22px 0;">
                  <span class="code">{{ .Token }}</span>
                </div>
                <p style="margin:0;font-family:'DM Sans','Helvetica Neue',Arial,sans-serif;font-size:13px;line-height:20px;color:#6E5A5E;">
                  This code expires in 10 minutes. If you didn't request it, please change your password.
                </p>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding:18px 8px 0 8px;font-family:'DM Sans','Helvetica Neue',Arial,sans-serif;font-size:11px;color:#6E5A5E;">
                MomentoVino · The wine journal you'll still have in 10 years.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
